<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="0; url=dashboard-qualidade.html" />
  <title>Dashboard de Qualidade — Universo Seg Pub</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #07101d;
      color: #f8fafc;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(720px, calc(100% - 48px));
      padding: 40px;
      border: 1px solid rgba(212, 175, 55, .35);
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(15, 23, 42, .95), rgba(2, 6, 23, .95));
      box-shadow: 0 30px 80px rgba(0,0,0,.35);
      text-align: center;
    }
    .mark {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(212, 175, 55, .65);
      color: #d4af37;
      font-weight: 900;
      letter-spacing: .18em;
    }
    h1 { margin: 0 0 10px; font-size: clamp(28px, 5vw, 46px); }
    p { color: #cbd5e1; line-height: 1.7; }
    a {
      display: inline-flex;
      margin-top: 18px;
      padding: 14px 20px;
      border-radius: 999px;
      color: #07101d;
      background: #d4af37;
      text-decoration: none;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">USP</div>
    <h1>Dashboard de Qualidade</h1>
    <p>Redirecionando para o painel de qualidade das informações de concursos.</p>
    <a href="dashboard-qualidade.html">Abrir dashboard</a>
  </main>
  <script>location.replace('dashboard-qualidade.html');</script>
</body>
</html>
